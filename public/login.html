<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureVault – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">

  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="auth-brand">
      <span class="lock-icon">🔐</span>
      <span class="brand">SecureVault</span>
    </div>
    <p class="auth-tagline">End-to-End Encrypted File Storage</p>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-form="login">Sign In</button>
        <button class="auth-tab" data-form="register">Create Account</button>
      </div>

      <!-- ── LOGIN FORM ── -->
      <form id="loginForm" class="auth-form active" novalidate>
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username" required />
          </div>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" data-target="loginPassword">👁</button>
          </div>
        </div>
        <div id="loginError" class="auth-error hidden"></div>
        <button type="submit" class="btn-auth" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
        <p class="auth-switch">Don't have an account? <a href="#" data-switch="register">Create one</a></p>
      </form>

      <!-- ── REGISTER FORM ── -->
      <form id="registerForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="regFullname">Full Name</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🙍</span>
            <input type="text" id="regFullname" placeholder="Your full name" autocomplete="name" required />
          </div>
        </div>
        <div class="form-group">
          <label for="regUsername">Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="regUsername" placeholder="Choose a username" autocomplete="username" required />
          </div>
          <p class="field-hint">Letters, numbers, underscores only. 3–30 characters.</p>
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="regPassword" placeholder="Create a password (min 6 chars)" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" data-target="regPassword">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label for="regConfirm">Confirm Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="regConfirm" placeholder="Repeat your password" autocomplete="new-password" required />
          </div>
        </div>
        <div id="registerError" class="auth-error hidden"></div>
        <button type="submit" class="btn-auth" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
        <p class="auth-switch">Already have an account? <a href="#" data-switch="login">Sign in</a></p>
      </form>

    </div>

    <!-- Security note -->
    <div class="auth-security-note">
      <span>🛡️</span>
      <span>Passwords are hashed with bcrypt &nbsp;·&nbsp; Sessions are encrypted &nbsp;·&nbsp; AES-256-GCM storage</span>
    </div>

  </div>

  <script src="auth.js"></script>
</body>
</html>
